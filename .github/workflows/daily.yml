name: Daily data update

on:
  schedule:
    - cron: "30 5 * * *"   # 05:30 UTC daily
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run daily pipeline (harvest, diff, enrich, dashboard)
        run: python daily_run.py

      - name: Commit and push updated data and dashboard
        run: |
          git config user.name "oswestry-street-reports-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data docs
          git diff --cached --quiet && echo "No changes today" && exit 0
          git commit -m "Daily update $(date -u +%Y-%m-%d)"
          git push
